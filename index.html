<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

  <script defer src="main.js"></script>
  
  <title>Frontend Mentor | Time tracking dashboard</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="sr-only">Time tracking dashboard</h1>
  <main class="dashboard">

    <section class="menu-user">
      <div class="menu-header">
        <img src="./images/image-jeremy.png" alt="avatar" class="avatar">
        <div class="use-details">
          <p class="text-preset-6 text-color-navy-200">Report for</p>
          <h2 class="text-preset-2 text-color-white">Jeremy Robson</h2>
        </div>
      </div>

      <nav class="menu-options">
        <ul>
          <li>
            <button type="button" class="text-preset-5-regular" data-value="daily">Daily</button>
          </li>
          <li>
            <button type="button" class="active text-preset-5-regular" data-value="weekly">Weekly</button>
          </li>
          <li>
            <button type="button" class="text-preset-5-regular" data-value="monthly">Monthly</button>
          </li>
        </ul>
      </nav>
    </section>

    <section class="dashboard-data">
      <div class="loading">
        <h2>Loading...</h2>
        <div class="loader"></div>
      </div> 
    </section>
    
  </main>
</body>
</html>
